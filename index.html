<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pomodoro Timer</h1>
            <div class="header-buttons">
                <button id="settings-toggle">⚙️</button>
                <button id="dark-mode-toggle">🌙</button>
            </div>
        </header>
        <div class="timer">
            <div class="time-display">
                <span id="minutes">25</span>:<span id="seconds">00</span>
            </div>
            <div class="controls">
                <div class="button-row">
                    <button id="toggle">Start</button>
                    <button id="reset">Reset</button>
                </div>
                <div class="control-options">
                    <label for="auto-continue-toggle" class="auto-continue-label">
                        <input type="checkbox" id="auto-continue-toggle" checked>
                        <span>Auto-continue</span>
                    </label>
                </div>
            </div>
        </div>
        <div class="session-status">
            <div class="session-info">
                <p id="current-session">Current Session: Work (25 min)</p>
                <p id="next-session">Next: Short Break (5 min)</p>
            </div>
            <div class="cycle-progress">
                <div class="progress-indicator">
                    <div class="progress-dot active" data-session="1"></div>
                    <div class="progress-dot" data-session="2"></div>
                    <div class="progress-dot" data-session="3"></div>
                    <div class="progress-dot" data-session="4"></div>
                </div>
                <p id="cycle-info">Work Session 1 of 4</p>
            </div>
        </div>
        <div class="event-log">
            <div class="event-log-header">
                <h2>Event Log</h2>
                <button id="clear-log" disabled>Clear</button>
            </div>
            <ul id="event-list"></ul>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Timer Settings</h2>
                <button id="close-settings">×</button>
            </div>
            <div class="settings-content">
                <div class="setting-group">
                    <label for="work-duration">Work Duration (minutes):</label>
                    <input type="number" id="work-duration" min="1" max="60" value="25">
                </div>
                <div class="setting-group">
                    <label for="short-break-duration">Short Break Duration (minutes):</label>
                    <input type="number" id="short-break-duration" min="1" max="30" value="5">
                </div>
                <div class="setting-group">
                    <label for="long-break-duration">Long Break Duration (minutes):</label>
                    <input type="number" id="long-break-duration" min="1" max="60" value="30">
                </div>
                <div class="settings-actions">
                    <button id="save-settings">Save Settings</button>
                    <button id="reset-settings">Reset to Defaults</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
